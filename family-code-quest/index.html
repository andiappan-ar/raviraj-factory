<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#fff4e6; --bg2:#ffe0c2; --bg3:#dbeeff;
    --ink:#3a2c20; --ink-soft:#7a6655;
    --card:#fffdf9; --line:#f0e3d2;
    --son:#ff8a3d; --son-deep:#e8651a; --son-soft:#fff0e3;
    --good:#2bb673; --good-soft:#e3f8ee;
    --warn:#ff5d73;
    --shadow:0 10px 0 rgba(58,44,32,.08), 0 18px 30px rgba(58,44,32,.12);
    --accent:var(--son); --accent-deep:var(--son-deep); --accent-soft:var(--son-soft);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Nunito',sans-serif;color:var(--ink);min-height:100vh;
    background:
      radial-gradient(1200px 600px at 15% -10%, var(--bg3), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, var(--bg2), transparent 55%),
      linear-gradient(160deg, var(--bg1), #fff8ef 60%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.04;z-index:0;
    background-image:radial-gradient(var(--ink) 1px, transparent 1px);
    background-size:7px 7px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 80px;position:relative;z-index:1}
  h1,h2,h3,.disp{font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:.3px}

  /* ---- Top bar ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Fredoka';font-size:1.45rem;color:var(--ink)}
  .brand .logo{
    width:42px;height:42px;border-radius:14px;display:grid;place-items:center;font-size:1.4rem;
    background:linear-gradient(140deg,#ffd27a,#ff8a3d);box-shadow:var(--shadow);transform:rotate(-6deg)
  }
  .whoami{
    display:flex;align-items:center;gap:8px;background:var(--card);border:2px solid var(--line);
    border-radius:999px;padding:5px 6px 5px 14px;box-shadow:0 6px 0 rgba(58,44,32,.06);cursor:pointer;font-weight:800
  }
  .whoami .dot{width:14px;height:14px;border-radius:50%;background:var(--accent)}
  .whoami .swap{background:var(--accent-soft);color:var(--accent-deep);border-radius:999px;padding:4px 10px;font-size:.8rem;font-weight:800}

  .card{background:var(--card);border:2px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:26px}
  .btn{
    font-family:'Fredoka';font-size:1.05rem;border:none;cursor:pointer;border-radius:18px;padding:14px 22px;color:#fff;
    background:var(--accent);box-shadow:0 6px 0 var(--accent-deep);transition:transform .08s, box-shadow .08s;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--accent-deep)}
  .btn.ghost{background:var(--card);color:var(--accent-deep);border:2px solid var(--accent);box-shadow:0 6px 0 rgba(58,44,32,.08)}
  .btn.lg{font-size:1.2rem;padding:16px 30px}

  /* ---- Home ---- */
  .hero{text-align:center;padding:24px 10px 6px}
  .hero .ava{
    width:110px;height:110px;border-radius:32px;margin:0 auto 14px;display:grid;place-items:center;font-size:3.4rem;
    background:var(--son-soft);border:3px solid var(--son);box-shadow:var(--shadow)
  }
  .hero h1{font-size:2.5rem;line-height:1.05;margin-bottom:8px}
  .hero p{color:var(--ink-soft);font-weight:700;font-size:1.05rem}
  .hero .row{margin-top:24px}

  /* ---- Roadmap ---- */
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;margin:6px 2px 18px}
  .pagehead h2{font-size:1.7rem}
  .pagehead .sub{color:var(--ink-soft);font-weight:700;font-size:.95rem}
  .weekband{display:flex;align-items:center;gap:10px;margin:26px 2px 12px}
  .weekband .pill{background:var(--accent);color:#fff;font-family:'Fredoka';border-radius:999px;padding:5px 16px;font-size:.95rem;box-shadow:0 4px 0 var(--accent-deep)}
  .weekband .wt{font-family:'Fredoka';color:var(--ink-soft)}
  .days{display:flex;flex-direction:column;gap:12px}
  .day{
    display:flex;align-items:center;gap:16px;background:var(--card);border:2px solid var(--line);
    border-radius:22px;padding:16px 18px;box-shadow:0 6px 0 rgba(58,44,32,.06);cursor:pointer;transition:transform .1s
  }
  .day:hover{transform:translatex(4px)}
  .day .num{
    flex:none;width:54px;height:54px;border-radius:16px;background:var(--accent-soft);color:var(--accent-deep);
    display:grid;place-items:center;font-family:'Fredoka';font-size:1.5rem
  }
  .day .body{flex:1;min-width:0}
  .day .body .t{font-family:'Fredoka';font-size:1.12rem}
  .day .body .meta{color:var(--ink-soft);font-weight:700;font-size:.85rem}
  .day .end{flex:none;font-size:1.1rem}
  .day.locked{opacity:.55;cursor:not-allowed;background:#faf6ef}
  .day.locked .num{background:#eee5d6;color:#b6a690}
  .day.done{border-color:var(--good)}
  .day.done .num{background:var(--good-soft);color:var(--good)}
  .build{
    display:flex;align-items:center;gap:14px;border:2px dashed var(--accent);background:var(--accent-soft);
    border-radius:22px;padding:16px 18px;margin-top:12px;cursor:pointer
  }
  .build .ic{font-size:1.8rem}
  .build .t{font-family:'Fredoka';font-size:1.08rem;color:var(--accent-deep)}
  .build .meta{font-weight:700;font-size:.85rem;color:var(--ink-soft)}
  .future{opacity:.6;font-weight:700;color:var(--ink-soft);font-size:.92rem;padding:10px 4px}

  .progresswrap{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .bar{flex:1;height:14px;border-radius:999px;background:#f0e6d6;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-deep));border-radius:999px;transition:width .5s}
  .progresswrap .lbl{font-family:'Fredoka';color:var(--accent-deep);white-space:nowrap}

  /* ---- Lesson / quiz ---- */
  .back{background:none;border:none;cursor:pointer;font-family:'Fredoka';color:var(--accent-deep);font-size:1rem;padding:4px 0;margin-bottom:6px}
  .lesson .badge{display:inline-block;background:var(--accent-soft);color:var(--accent-deep);font-family:'Fredoka';border-radius:999px;padding:4px 14px;font-size:.85rem;margin-bottom:10px}
  .lesson h2{font-size:2rem;line-height:1.1;margin-bottom:6px}
  .lesson .big-emoji{font-size:3.4rem;margin:4px 0 10px}
  .concept{font-size:1.35rem;line-height:1.7;font-weight:700;color:var(--ink)}
  .speak{margin-top:16px;display:inline-flex;align-items:center;gap:8px}
  .qcount{color:var(--ink-soft);font-weight:800;font-size:.9rem;margin-bottom:6px}
  .question{font-family:'Fredoka';font-size:1.8rem;line-height:1.25;margin:6px 0 18px}
  .opts{display:flex;flex-direction:column;gap:12px}
  .opt{
    display:flex;align-items:center;gap:14px;text-align:left;background:var(--card);border:3px solid var(--line);
    border-radius:18px;padding:18px;cursor:pointer;font-weight:800;font-size:1.3rem;box-shadow:0 5px 0 rgba(58,44,32,.06);
    transition:transform .08s,border-color .12s,background .12s
  }
  .opt:hover{transform:translateY(-2px);border-color:var(--accent)}
  .opt .oe{font-size:1.6rem}
  .opt.correct{border-color:var(--good);background:var(--good-soft)}
  .opt.wrong{border-color:var(--warn);background:#fff0f2}
  .opt:disabled{cursor:default}
  .feed{font-family:'Fredoka';font-size:1.3rem;margin-top:14px}
  .feed.ok{color:var(--good)}
  .feed.no{color:var(--warn)}

  /* ---- Result ---- */
  .result{text-align:center;padding:14px 6px}
  .result .big{font-size:4rem;margin-bottom:6px}
  .result h2{font-size:2.1rem}
  .result .score{font-family:'Fredoka';font-size:1.4rem;color:var(--accent-deep);margin:8px 0 2px}
  .result .starline{font-size:2.2rem;margin:10px 0 18px;letter-spacing:6px}

  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:18px}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  .editname{font-size:.78rem;color:var(--ink-soft);text-decoration:underline;cursor:pointer;font-weight:700;margin-top:6px;display:inline-block}
  .footnote{text-align:center;color:var(--ink-soft);font-weight:700;font-size:.8rem;margin-top:30px;line-height:1.6}

  /* ---- Dashboard ---- */
  .dcard{border:2px solid var(--son);border-radius:22px;padding:18px;background:var(--card);box-shadow:0 6px 0 rgba(58,44,32,.06);margin-bottom:8px}
  .dcard .h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .dcard .h .a{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:1.6rem;flex:none;background:var(--son-soft);border:2px solid var(--son)}
  .dcard .h .nm{font-family:'Fredoka';font-size:1.15rem;line-height:1.1}
  .dcard .h .ro{color:var(--ink-soft);font-weight:700;font-size:.78rem}
  .dstat{display:flex;justify-content:space-between;font-weight:800;padding:6px 0;border-top:1px dashed var(--line);font-size:.92rem}
  .dstat span:last-child{font-family:'Fredoka'}
  .section-t{font-family:'Fredoka';font-size:1.3rem;margin:24px 2px 12px}
  .wrow{display:flex;align-items:center;gap:10px;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:10px}
  .wrow .wn{flex:none;font-family:'Fredoka';background:#f0e6d6;border-radius:10px;padding:4px 10px;font-size:.85rem;color:var(--ink-soft)}
  .wrow .wtt{flex:1;font-weight:800;font-size:.9rem;min-width:0}
  .wrow .wstat{flex:none;font-weight:800;font-size:.82rem;text-align:right;color:var(--son-deep)}
  .feeditem{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px dashed var(--line);font-weight:700;font-size:.92rem}
  .feeditem .when{margin-left:auto;color:var(--ink-soft);font-size:.8rem;white-space:nowrap}
  .dashbtn{display:block;width:100%;text-align:center;background:#5a6b7b;box-shadow:0 6px 0 #3f4d59}
  .maplink{background:none;border:none;cursor:pointer;color:var(--accent-deep);font-family:'Fredoka';font-size:.95rem;white-space:nowrap}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="wrap" id="app"></div>

<script>
/* ============================================================
   CODE QUEST  —  Raviraj's coding syllabus
   A day-by-day coding curriculum + quiz for one young learner.

   >>> HOW TO ADD MORE DAYS <<<
   Scroll to the CURRICULUM array below. Copy any day object,
   change the numbers/text, and it appears automatically.
   Each day is one short concept + a 3-question quiz (kid level).
   Build tasks live in the WEEKS array.
   ============================================================ */

/* ---------- Storage: works in Claude, when self-hosted, or offline ---------- */
const Store = {
  mem:{},
  async get(k){
    try{ if(window.storage&&window.storage.get){ const r=await window.storage.get(k); return r?r.value:null; } }catch(e){}
    try{ const v=localStorage.getItem(k); if(v!==null) return v; }catch(e){}
    return (k in this.mem)?this.mem[k]:null;
  },
  async set(k,v){
    try{ if(window.storage&&window.storage.set){ await window.storage.set(k,v,false); return; } }catch(e){}
    try{ localStorage.setItem(k,v); return; }catch(e){}
    this.mem[k]=v;
  }
};

/* ---------- The one learner ---------- */
const LEARNER = { defName:'Raviraj', role:'The Explorer', ava:'🦊', tool:'ScratchJr' };

/* ---------- Weeks (titles + build tasks) ---------- */
const WEEKS = {
  1:{ title:'Telling the Computer What to Do',
      build:{ icon:'🛠️',
        text:'Make your cat walk across the screen and say "Hi!". Ask a grown-up to help, then ask the AI helper: "How do I make my Scratch cat move and talk?"' } },
  2:{ title:'Repeating & Reacting',
      build:{ icon:'🛠️',
        text:'Make your cat bounce around the screen forever! Then ask the AI helper to make it change colour while it bounces. 🌈' } }
};

/* ---------- The Curriculum (one track — kid level) ---------- */
const CURRICULUM = [
  { day:1, week:1, title:'What is a Program?', emoji:'📜',
    concept:'A program is a list of steps. The computer does each step one at a time — just like following a recipe to bake cookies! 🍪',
    quiz:[
      {q:'A program is most like a...', o:[{e:'🍪',t:'Recipe'},{e:'😴',t:'Nap'},{e:'🎈',t:'Balloon'}], a:0},
      {q:'How does the computer do the steps?', o:[{e:'1️⃣',t:'One at a time'},{e:'🌀',t:'All jumbled up'}], a:0},
      {q:'Who follows the steps?', o:[{e:'💻',t:'The computer'},{e:'🐶',t:'The dog'}], a:0}
    ]},

  { day:2, week:1, title:'Exact Instructions', emoji:'🤖',
    concept:'Computers are a bit silly! 🤖 They do EXACTLY what you tell them. If you say "put on shoes" before "put on socks", you get shoes with no socks! So we tell them very carefully.',
    quiz:[
      {q:'You tell a robot "spread the jam" before "open the jar". What happens?', o:[{e:'🫙',t:'It can\'t — jar is shut!'},{e:'🥪',t:'Yummy sandwich'}], a:0},
      {q:'Computers do what you...', o:[{e:'🎯',t:'Say, exactly'},{e:'🌟',t:'Wish for'}], a:0},
      {q:'Are computers clever like people?', o:[{e:'🤖',t:'No — they need exact steps'},{e:'🧠',t:'Yes, super smart'}], a:0}
    ]},

  { day:3, week:1, title:'Order Matters', emoji:'🔢',
    concept:'The ORDER of your steps matters! 🔢 You put on socks 🧦 and THEN shoes 👟 — not the other way round. Mixing up the order makes silly things happen.',
    quiz:[
      {q:'What goes on first?', o:[{e:'🧦',t:'Socks, then shoes'},{e:'👟',t:'Shoes, then socks'}], a:0},
      {q:'Making toast — what is the first step?', o:[{e:'🍞',t:'Put bread in'},{e:'😋',t:'Eat it'}], a:0},
      {q:'Does the order of steps matter?', o:[{e:'🔢',t:'Yes it does!'},{e:'🤷',t:'Nope'}], a:0}
    ]},

  { day:4, week:1, title:'Meet Scratch: Sprites & the Green Flag', emoji:'🐱',
    concept:'In Scratch, the cat 🐱 is called a SPRITE — your little character. When you press the green flag 🏁, your program starts. Green flag means GO!',
    quiz:[
      {q:'The cat in Scratch is called a...', o:[{e:'🐱',t:'Sprite'},{e:'🐶',t:'Doggo'}], a:0},
      {q:'Which button STARTS your program?', o:[{e:'🏁',t:'Green flag'},{e:'🛑',t:'Red stop'}], a:0},
      {q:'Green flag means...', o:[{e:'▶️',t:'GO!'},{e:'✋',t:'STOP'}], a:0}
    ]},

  { day:5, week:1, title:'Make It Move! (+ Week Review)', emoji:'👟',
    concept:'Motion blocks make the cat MOVE! ➡️ "Move 10 steps" slides it along, and "turn" spins it. Try it: green flag 🏁 → move → watch your cat go!',
    quiz:[
      {q:'Which block makes the cat move?', o:[{e:'➡️',t:'Move block'},{e:'🔊',t:'Sound block'}], a:0},
      {q:'A program is a list of...', o:[{e:'📋',t:'Steps'},{e:'🍬',t:'Snacks'}], a:0},
      {q:'What starts your program?', o:[{e:'🏁',t:'Green flag'},{e:'🌙',t:'Nothing'}], a:0}
    ]},

  { day:6, week:2, title:'Events: When This, Do That', emoji:'👆',
    concept:'An EVENT is when something happens! 👆 "When I click the cat → it meows 🔊". When ___ happens, do ___ !',
    quiz:[
      {q:'"When I click → cat meows". Clicking is the...', o:[{e:'👆',t:'Event'},{e:'🍬',t:'Snack'}], a:0},
      {q:'An event is like...', o:[{e:'⚡',t:'When something happens'},{e:'😴',t:'Going to sleep'}], a:0},
      {q:'When the flag is clicked, the program...', o:[{e:'🏁',t:'Starts'},{e:'🙈',t:'Hides'}], a:0}
    ]},

  { day:7, week:2, title:'Loops: Repeat!', emoji:'🔁',
    concept:'A LOOP repeats steps so you don\'t have to write them again and again! 🔁 "Repeat 4 times: move + turn" draws a square! ⬛',
    quiz:[
      {q:'A loop helps you...', o:[{e:'🔁',t:'Repeat steps'},{e:'😴',t:'Take a nap'}], a:0},
      {q:'"Repeat 4" means do it...', o:[{e:'4️⃣',t:'4 times'},{e:'1️⃣',t:'1 time'}], a:0},
      {q:'Loops save us from...', o:[{e:'😅',t:'Writing the same thing lots'},{e:'🎉',t:'Having fun'}], a:0}
    ]},

  { day:8, week:2, title:'Forever Loops', emoji:'♾️',
    concept:'A FOREVER loop never stops! ♾️ "Forever: move" makes the cat go and go and go! It\'s great for things that should keep happening.',
    quiz:[
      {q:'A forever loop stops...', o:[{e:'♾️',t:'Never!'},{e:'⏱️',t:'Right away'}], a:0},
      {q:'Forever is good for things that...', o:[{e:'🔄',t:'Keep going'},{e:'1️⃣',t:'Happen once'}], a:0},
      {q:'To stop a forever loop you press...', o:[{e:'🛑',t:'The red stop'},{e:'🌙',t:'Nothing'}], a:0}
    ]},

  { day:9, week:2, title:'Putting It Together: Motion + Loops', emoji:'🎬',
    concept:'Mix them together! 🎬 "Forever: move 10, if on edge bounce" makes the cat bounce around like a ball! ⚽ Blocks work as a team.',
    quiz:[
      {q:'To make the cat bounce around, you use move AND a...', o:[{e:'🔁',t:'Loop'},{e:'🍬',t:'Snack'}], a:0},
      {q:'Blocks work best when they...', o:[{e:'🤝',t:'Work together'},{e:'🥊',t:'Fight'}], a:0},
      {q:'"If on edge, bounce" stops the cat from...', o:[{e:'📺',t:'Going off the screen'},{e:'🔊',t:'Meowing'}], a:0}
    ]},

  { day:10, week:2, title:'Big Review & Trophy Quiz', emoji:'🏆',
    concept:'You learned SO much! 🏆 Programs, sprites, the green flag, loops and forever. Let\'s do one happy review quiz and grab your trophy! 🎉',
    quiz:[
      {q:'What repeats steps for you?', o:[{e:'🔁',t:'A loop'},{e:'🍬',t:'A snack'}], a:0},
      {q:'What starts your program?', o:[{e:'🏁',t:'Green flag'},{e:'🛑',t:'Red stop'}], a:0},
      {q:'The cat character is a...', o:[{e:'🐱',t:'Sprite'},{e:'🐟',t:'Fish'}], a:0},
      {q:'Does the order of steps matter?', o:[{e:'🔢',t:'Yes!'},{e:'🤷',t:'Never'}], a:0}
    ]}
];

/* Topics coming after Week 2 — shown on the roadmap, easy to build out later */
const FUTURE = [
  'Week 3 — Decisions: if / then (making choices)',
  'Week 4 — Comparing & sensing (is it touching? is it bigger?)',
  'Week 5 — Variables: the computer’s memory (keep a score!)',
  'Week 6 — Decomposition: break a big idea into small steps',
  'Week 7 — Make a simple game (catch the falling apple 🍎)',
  'Week 8 — How real apps work: screen, brain & memory',
  'Week 9 — Building WITH AI: describe → get code → try → fix',
  'Week 10 — Family project: design & build something together 🎉'
];

/* =================== App logic =================== */
const app = document.getElementById('app');
let progress = {};        // {completed:{day:stars}, builds:{week:iso}, dates:{day:iso}, lastActive}
let name = LEARNER.defName;

const maxDay = Math.max(...CURRICULUM.map(d=>d.day));

async function boot(){
  const n = await Store.get('fcq:name');
  if(n) name = n;
  const raw = await Store.get('fcq:progress');
  progress = raw ? JSON.parse(raw) : {completed:{}, builds:{}, dates:{}};
  progress.completed = progress.completed || {};
  progress.builds = progress.builds || {};
  progress.dates = progress.dates || {};
  renderHome();
}

async function saveProgress(){
  await Store.set('fcq:progress', JSON.stringify(progress));
}

function starsFor(score,total){
  const pct=score/total;
  if(pct>=0.99) return 3;
  if(pct>=0.66) return 2;
  return 1;
}
function isDone(day){ return day in progress.completed; }
function isUnlocked(day){ return day===1 || isDone(day-1); }

/* ---------- Attribute-safe string for inline onclick (handles ' and ") ---------- */
function sattr(s){ return JSON.stringify(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;'); }

/* ---------- Read aloud ---------- */
function speak(text){
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.replace(/[^\p{L}\p{N}\s.,!?'"-]/gu,' '));
    u.rate=0.95; u.pitch=1.05;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* =================== Screens =================== */
function renderHome(){
  const done = Object.keys(progress.completed).length;
  const ready = done===0 ? 'Ready for Day 1?' : (done<maxDay ? `You’re up to Day ${done+1}!` : 'You finished every lesson! 🏆');
  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="logo">🚀</span> Code Quest</div>
    </div>
    <div class="hero">
      <div class="ava">${LEARNER.ava}</div>
      <h1>Hi ${name}! 👋</h1>
      <p>Learn to think like a builder — a little bit every day.</p>
      <div class="editname" onclick="renameLearner()">rename</div>
      <div class="row">
        <button class="btn lg" onclick="renderRoadmap()">${done===0?'Start my quest 🎮':'Continue 🎮'}</button>
      </div>
      <p style="margin-top:14px;font-size:.95rem">${ready}</p>
    </div>
    <button class="btn dashbtn" onclick="renderDashboard()" style="max-width:430px;margin:22px auto 0">👀 Parent Dashboard — progress & weekly review</button>
    <div class="footnote">
      ${maxDay} lessons ready · a new concept + quiz each day · a build-with-AI mission each week<br>
      Tip: tap the 🔊 buttons to hear everything read aloud.
    </div>`;
}

async function renameLearner(){
  const v = prompt('Name for this learner:', name);
  if(v && v.trim()){
    name = v.trim();
    await Store.set('fcq:name', name);
    renderHome();
  }
}

function renderRoadmap(){
  const done = Object.keys(progress.completed).length;
  const pct = Math.round(done/maxDay*100);
  let weeksHtml = '';
  const weekNums = [...new Set(CURRICULUM.map(d=>d.week))].sort((a,b)=>a-b);

  weekNums.forEach(wn=>{
    const w = WEEKS[wn] || {title:''};
    weeksHtml += `<div class="weekband"><span class="pill">Week ${wn}</span><span class="wt">${w.title}</span></div><div class="days">`;
    CURRICULUM.filter(d=>d.week===wn).forEach(d=>{
      const unlocked=isUnlocked(d.day), done=isDone(d.day);
      const cls = done?'done':(unlocked?'':'locked');
      const stars = done ? '⭐'.repeat(progress.completed[d.day]) : '';
      const end = done? stars : (unlocked? '▶️' : '🔒');
      weeksHtml += `
        <div class="day ${cls}" ${unlocked?`onclick="openDay(${d.day})"`:''}>
          <div class="num">${done?'✓':d.day}</div>
          <div class="body">
            <div class="t">${d.emoji} ${d.title}</div>
            <div class="meta">Day ${d.day}${done?' · complete':(unlocked?' · tap to start':' · finish the day before')}</div>
          </div>
          <div class="end">${end}</div>
        </div>`;
    });
    // build task at end of week (unlocks once all week days done)
    if(w.build){
      const weekDays = CURRICULUM.filter(d=>d.week===wn).map(d=>d.day);
      const weekDone = weekDays.every(isDone);
      const bDone = progress.builds[wn];
      weeksHtml += `
        <div class="build" style="${weekDone?'':'opacity:.5'}" ${weekDone?`onclick="toggleBuild(${wn})"`:''}>
          <div class="ic">${bDone?'✅':w.build.icon}</div>
          <div style="flex:1">
            <div class="t">Weekly Build Mission</div>
            <div class="meta">${weekDone?(bDone?'Done! Tap to un-tick':'Tap when you’ve built it'):'Unlocks after the week’s lessons'}</div>
          </div>
        </div>`;
    }
    weeksHtml += `</div>`;
  });

  let futureHtml = '<div style="margin-top:26px">';
  FUTURE.forEach(f=> futureHtml += `<div class="future">🌱 ${f}</div>`);
  futureHtml += `<div class="future" style="opacity:.5">More lessons can be added any time — see the notes inside the file.</div></div>`;

  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="logo">🚀</span> Code Quest</div>
      <div class="whoami" onclick="renderHome()">
        <span class="dot"></span>${LEARNER.ava} ${name}<span class="swap">home</span>
      </div>
    </div>
    <div class="progresswrap">
      <div class="lbl">${done}/${maxDay}</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="lbl">${pct}%</div>
    </div>
    <div class="pagehead"><div><h2>Your Quest Map</h2><div class="sub">One step a day. No rush — it’s okay to get things wrong.</div></div><button class="maplink" onclick="renderDashboard()">📊 Dashboard</button></div>
    ${weeksHtml}
    ${futureHtml}
    <div class="footnote">Using <b>${LEARNER.tool}</b> to build along.</div>`;
}

async function toggleBuild(wn){
  progress.builds[wn] = progress.builds[wn] ? false : new Date().toISOString();
  progress.lastActive = new Date().toISOString();
  await saveProgress();
  renderRoadmap();
}

/* =================== Parent Dashboard =================== */
function startOfDay(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); }
function timeAgo(iso){
  if(!iso) return 'Not started';
  const d=new Date(iso), now=new Date();
  const days=Math.round((startOfDay(now)-startOfDay(d))/86400000);
  if(days<=0) return 'Today';
  if(days===1) return 'Yesterday';
  if(days<7) return days+' days ago';
  return d.toLocaleDateString();
}

function renderDashboard(){
  const r=document.documentElement.style;
  r.setProperty('--accent','#5a6b7b'); r.setProperty('--accent-deep','#3f4d59'); r.setProperty('--accent-soft','#eef2f5');

  const doneCount=Object.keys(progress.completed).length;
  const stars=Object.values(progress.completed).reduce((a,b)=>a+(+b||0),0);
  const curDay=doneCount<maxDay?doneCount+1:maxDay;
  const builds=Object.values(progress.builds).filter(Boolean).length;
  const sumCard = `<div class="dcard">
      <div class="h"><div class="a">${LEARNER.ava}</div><div><div class="nm">${name}</div><div class="ro">${LEARNER.role} · ${LEARNER.tool}</div></div></div>
      <div class="dstat"><span>Lessons done</span><span>${doneCount} / ${maxDay}</span></div>
      <div class="dstat"><span>Stars earned</span><span>⭐ ${stars} / ${maxDay*3}</span></div>
      <div class="dstat"><span>Build missions</span><span>🛠️ ${builds}</span></div>
      <div class="dstat"><span>Currently on</span><span>Day ${curDay}</span></div>
      <div class="dstat"><span>Last active</span><span>${timeAgo(progress.lastActive)}</span></div>
    </div>`;

  const weekNums=[...new Set(CURRICULUM.map(d=>d.week))].sort((a,b)=>a-b);
  let weekly='';
  weekNums.forEach(wn=>{
    const w=WEEKS[wn]||{title:''};
    const wd=CURRICULUM.filter(d=>d.week===wn).map(d=>d.day);
    const c=wd.filter(d=>d in progress.completed).length;
    const st=wd.reduce((a,d)=>a+(progress.completed[d]||0),0);
    const b=progress.builds[wn]?' 🛠️✓':'';
    weekly+=`<div class="wrow"><span class="wn">W${wn}</span><span class="wtt">${w.title}</span>
      <span class="wstat">${c}/${wd.length} ⭐${st}${b}</span></div>`;
  });

  let acts=Object.keys(progress.completed)
    .map(day=>({day:+day,stars:progress.completed[day],date:progress.dates[day]}))
    .filter(a=>a.date)
    .sort((a,b)=>new Date(b.date)-new Date(a.date))
    .slice(0,7);
  const feed = acts.length ? acts.map(a=>{
    const d=CURRICULUM.find(x=>x.day===a.day);
    return `<div class="feeditem">${LEARNER.ava}<span>${name} finished <b>Day ${a.day}</b> · ${d?d.title:''} ${'⭐'.repeat(a.stars)}</span><span class="when">${timeAgo(a.date)}</span></div>`;
  }).join('') : `<div class="feeditem" style="color:var(--ink-soft);border:none">No lessons finished yet — daily activity will show up here.</div>`;

  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="logo" style="background:linear-gradient(140deg,#9fb3c2,#5a6b7b);transform:rotate(-4deg)">📊</span> Parent Dashboard</div>
      <button class="maplink" onclick="renderHome()">← Home</button>
    </div>
    <p style="color:var(--ink-soft);font-weight:700;margin:0 2px 16px">For parents — watch ${name}’s daily progress and review each week.</p>
    ${sumCard}
    <div class="section-t">🗓️ Weekly Review</div>
    ${weekly}
    <div class="section-t">⏱️ Recent Activity</div>
    <div>${feed}</div>
    <button class="btn dashbtn" onclick="renderHome()" style="margin-top:18px">← Back to Home</button>`;
}

/* ---------- Lesson (concept) ---------- */
function openDay(day){
  const d = CURRICULUM.find(x=>x.day===day);
  const text = d.concept;
  app.innerHTML = `
    <div class="topbar">
      <div class="brand" style="font-size:1.1rem"><span class="logo" style="width:34px;height:34px;font-size:1.1rem">🚀</span> Day ${d.day}</div>
      <div class="whoami" onclick="renderRoadmap()"><span class="dot"></span>${LEARNER.ava} ${name}<span class="swap">map</span></div>
    </div>
    <div class="card lesson">
      <button class="back" onclick="renderRoadmap()">← Back to the map</button>
      <div class="badge">Week ${d.week} · Day ${d.day}</div>
      <div class="big-emoji">${d.emoji}</div>
      <h2>${d.title}</h2>
      <p class="concept">${text}</p>
      <div class="speak">
        <button class="btn ghost" onclick='speak(${sattr(text)})'>🔊 Read it to me</button>
      </div>
      <div style="margin-top:24px">
        <button class="btn lg" onclick="startQuiz(${d.day})">Start the quiz 🎮</button>
      </div>
    </div>`;
}

/* ---------- Quiz ---------- */
let quizState = null;
function startQuiz(day){
  const d = CURRICULUM.find(x=>x.day===day);
  quizState = { day, questions:d.quiz, i:0, score:0, answered:false };
  renderQuestion();
}

function renderQuestion(){
  const {questions, i} = quizState;
  const q = questions[i];
  const optsHtml = q.o.map((o,idx)=>`
    <button class="opt" id="opt-${idx}" onclick="answer(${idx})">
      ${o.e?`<span class="oe">${o.e}</span>`:''}<span>${o.t}</span>
    </button>`).join('');
  app.innerHTML = `
    <div class="topbar">
      <div class="brand" style="font-size:1.1rem"><span class="logo" style="width:34px;height:34px;font-size:1.1rem">🚀</span> Quiz</div>
      <div class="whoami" onclick="renderRoadmap()"><span class="dot"></span>${LEARNER.ava} ${name}<span class="swap">exit</span></div>
    </div>
    <div class="card">
      <div class="qcount">Question ${i+1} of ${questions.length}</div>
      <div class="question">${q.q}
        <button class="btn ghost" style="font-size:.85rem;padding:8px 12px;vertical-align:middle;margin-left:6px" onclick='speak(${sattr(q.q+'. '+q.o.map(x=>x.t).join(", or, "))})'>🔊</button>
      </div>
      <div class="opts">${optsHtml}</div>
      <div id="feedarea"></div>
    </div>`;
}

function answer(idx){
  if(quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.i];
  const correct = q.a;
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  document.getElementById('opt-'+correct).classList.add('correct');

  const feed = document.getElementById('feedarea');
  if(idx===correct){
    quizState.score++;
    feed.innerHTML = `<div class="feed ok">🎉 Yay! That’s right!</div>`;
    miniBurst();
  }else{
    document.getElementById('opt-'+idx).classList.add('wrong');
    feed.innerHTML = `<div class="feed no">Oops! The green one is right — good try! 💛</div>`;
  }
  const last = quizState.i === quizState.questions.length-1;
  feed.innerHTML += `<div style="margin-top:18px"><button class="btn lg" onclick="nextQ()">${last?'See my result 🏆':'Next →'}</button></div>`;
}

function nextQ(){
  if(quizState.i < quizState.questions.length-1){
    quizState.i++; quizState.answered=false;
    renderQuestion();
  }else{
    finishQuiz();
  }
}

async function finishQuiz(){
  const {day, score, questions} = quizState;
  const total = questions.length;
  const stars = starsFor(score, total);
  const prev = progress.completed[day] || 0;
  progress.completed[day] = Math.max(prev, stars);
  progress.dates[day] = new Date().toISOString();
  progress.lastActive = new Date().toISOString();
  await saveProgress();
  const perfect = score===total;
  if(stars>=2) bigConfetti();
  const nextDay = CURRICULUM.find(x=>x.day===day+1);
  app.innerHTML = `
    <div class="topbar">
      <div class="brand" style="font-size:1.1rem"><span class="logo" style="width:34px;height:34px;font-size:1.1rem">🚀</span> Result</div>
      <div class="whoami" onclick="renderRoadmap()"><span class="dot"></span>${LEARNER.ava} ${name}<span class="swap">map</span></div>
    </div>
    <div class="card result">
      <div class="big">${perfect?'🏆':(stars>=2?'🎉':'🌟')}</div>
      <h2>${perfect?'Superstar!':'Great job!'}</h2>
      <div class="score">You got ${score} out of ${total}</div>
      <div class="starline">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      <p style="color:var(--ink-soft);font-weight:700">Day ${day} complete — ${nextDay?`Day ${day+1} is now unlocked!`:'you’ve reached the end of the ready lessons!'}</p>
      <div class="row">
        ${score<total?`<button class="btn ghost" onclick="startQuiz(${day})">Try again 🔁</button>`:''}
        ${nextDay?`<button class="btn" onclick="openDay(${day+1})">Next lesson →</button>`:''}
        <button class="btn ghost" onclick="renderRoadmap()">Back to map 🗺️</button>
      </div>
    </div>`;
}

/* =================== Confetti =================== */
const cv=document.getElementById('confetti'), cx=cv.getContext('2d');
let parts=[], raf=null;
function resize(){cv.width=innerWidth;cv.height=innerHeight}
addEventListener('resize',resize);resize();
const COLORS=['#ff8a3d','#6c5ce7','#2bb673','#ffd27a','#ff5d73','#3db5ff'];
function spawn(n,spread){
  for(let i=0;i<n;i++){
    parts.push({x:innerWidth/2,y:innerHeight*0.35,
      vx:(Math.random()-0.5)*spread, vy:Math.random()*-12-4,
      g:0.35+Math.random()*0.2, s:6+Math.random()*8,
      c:COLORS[i%COLORS.length], rot:Math.random()*6, vr:(Math.random()-0.5)*0.4, life:0});
  }
  if(!raf) loop();
}
function loop(){
  cx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.c;
    cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);cx.restore();});
  parts=parts.filter(p=>p.y<innerHeight+40 && p.life<200);
  if(parts.length) raf=requestAnimationFrame(loop); else {raf=null;cx.clearRect(0,0,cv.width,cv.height);}
}
function miniBurst(){ spawn(24,10); }
function bigConfetti(){ spawn(90,18); }

boot();
</script>
